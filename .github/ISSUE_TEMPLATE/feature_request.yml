name: Feature request
description: Suggest an enhancement.
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case rather than jumping to a specific solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: How would this work? Mockups, sketches, command examples all welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't fit.
